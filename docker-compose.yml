services:
  db:
    image: postgres:17
    container_name: jobmatcher-db
    environment:
      POSTGRES_DB: jobmatcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobmatcher"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
